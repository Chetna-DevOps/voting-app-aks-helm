# Configuration values used by Helm templates

replicaCount: 1

image:
  repository: <ACR_LOGIN_SERVER>/votinghelm/result
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 90
  targetPort: 90

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: result-helm.<YOUR-CLUSTER-IP>.nip.io
      paths:
        - /
