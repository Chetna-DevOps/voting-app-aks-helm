# Exposes PostgreSQL internally within the cluster

apiVersion: v1
kind: Service
metadata:
  name: {{ include "db.fullname" . }}
  labels:
    app: {{ include "db.name" . }}
    helm.sh/chart: {{ include "db.chart" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: {{ include "db.name" . }}
